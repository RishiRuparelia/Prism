<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --sand: #e8c97a;
    --dark: #0a0805;
    --dark2: #120f08;
    --dark3: #1a1510;
    --amber: #ff9900;
    --sky: #1a3a5c;
    --sky-light: #2a5a8c;
    --prism-blue: #4fc3f7;
    --prism-pink: #f06292;
    --prism-green: #81c784;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: #e8dcc8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== CANVAS SCENE ===== */
  #scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  /* Sky gradient */
  #sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      #020408 0%,
      #050d1a 30%,
      #0d1f3a 55%,
      #1a2e1a 70%,
      #2c1f05 82%,
      #3d2a08 90%,
      #1a0e02 100%
    );
  }

  /* Stars */
  #stars {
    position: absolute;
    inset: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) var(--delay) infinite ease-in-out alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--min-o); transform: scale(1); }
    to   { opacity: 1; transform: scale(1.4); }
  }

  /* Moon */
  #moon {
    position: absolute;
    top: 6%;
    right: 12%;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #fffbe0, #f0d060 60%, #c8a840);
    box-shadow: 0 0 30px 10px rgba(200,168,64,0.25), 0 0 80px 30px rgba(200,168,64,0.1);
    animation: moonGlow 4s ease-in-out infinite alternate;
  }
  @keyframes moonGlow {
    from { box-shadow: 0 0 30px 10px rgba(200,168,64,0.2), 0 0 80px 30px rgba(200,168,64,0.08); }
    to   { box-shadow: 0 0 40px 14px rgba(200,168,64,0.35), 0 0 100px 40px rgba(200,168,64,0.15); }
  }

  /* Nile River */
  #nile {
    position: absolute;
    bottom: 18%;
    left: 0; right: 0;
    height: 28px;
    background: linear-gradient(90deg, transparent 0%, #0d3b5e 15%, #1a5a8c 40%, #2272b0 55%, #1a5a8c 70%, #0d3b5e 85%, transparent 100%);
    opacity: 0.55;
    filter: blur(1px);
  }
  #nile::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(79,195,247,0.2) 30%, rgba(79,195,247,0.4) 50%, rgba(79,195,247,0.2) 70%, transparent 100%);
    animation: nileShimmer 3s ease-in-out infinite alternate;
  }
  @keyframes nileShimmer {
    from { opacity: 0.4; }
    to   { opacity: 1; }
  }

  /* Desert floor */
  #desert {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 22%;
    background: linear-gradient(to bottom, #3d2a08, #2c1e06 40%, #1a0e02);
  }
  #desert::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 10px;
    background: linear-gradient(to bottom, #5a4010, transparent);
  }

  /* Sand dunes */
  .dune {
    position: absolute;
    bottom: 18%;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 80%, #5a4015, #3a2808);
    opacity: 0.7;
  }

  /* ===== PYRAMID SCENE ===== */
  #pyramid-scene {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    width: 440px;
    height: 320px;
  }

  /* Pyramid blocks container — clips reveal animation */
  #pyramid-wrapper {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 440px;
    height: 300px;
    overflow: hidden;
  }

  /* SVG pyramid */
  #pyramid-svg {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* Construction progress — blocks revealed row by row */
  .block-row {
    animation: revealRow 0.6s ease-out both;
  }

  @keyframes revealRow {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Prism glow on pyramid tip */
  #pyramid-tip-glow {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    filter: blur(8px);
    animation: tipGlow 2s ease-in-out infinite alternate;
    opacity: 0;
    transition: opacity 2s;
  }
  @keyframes tipGlow {
    from { filter: blur(6px) drop-shadow(0 0 8px #4fc3f7); }
    to   { filter: blur(10px) drop-shadow(0 0 20px #f06292); }
  }

  /* Light beam from pyramid */
  .light-beam {
    position: absolute;
    top: 0;
    left: 50%;
    transform-origin: bottom center;
    width: 2px;
    background: linear-gradient(to top, transparent, rgba(255,255,255,0.06));
    animation: beamSway 5s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes beamSway {
    from { opacity: 0.4; transform: rotate(-15deg) scaleY(1); }
    to   { opacity: 0.8; transform: rotate(15deg) scaleY(1.2); }
  }

  /* ===== EGYPTIANS (workers) ===== */
  .worker {
    position: absolute;
    bottom: 0;
    width: 14px;
    height: 28px;
    animation: workerWalk var(--walk-dur) linear infinite;
  }
  @keyframes workerWalk {
    0%   { transform: translateX(var(--start-x)); }
    48%  { transform: translateX(var(--end-x)); }
    50%  { transform: translateX(var(--end-x)) scaleX(-1); }
    98%  { transform: translateX(var(--start-x)) scaleX(-1); }
    100% { transform: translateX(var(--start-x)); }
  }

  /* Worker carrying block */
  .worker svg {
    width: 100%;
    height: 100%;
    animation: workerBob 0.4s ease-in-out infinite alternate;
  }
  @keyframes workerBob {
    from { transform: translateY(0px); }
    to   { transform: translateY(-2px); }
  }

  /* Torches / fires */
  .torch {
    position: absolute;
    bottom: 2px;
    width: 6px;
    height: 16px;
  }
  .torch::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 1px;
    width: 4px;
    height: 10px;
    background: #5a3a10;
    border-radius: 1px;
  }
  .flame {
    position: absolute;
    bottom: 8px;
    left: 0;
    width: 6px;
    height: 8px;
    background: radial-gradient(ellipse at 50% 80%, #ff6600, #ffcc00 40%, rgba(255,200,0,0) 100%);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 0.15s ease-in-out infinite alternate;
  }
  @keyframes flicker {
    from { transform: scaleY(1) scaleX(1) translateY(0); opacity: 0.9; }
    to   { transform: scaleY(1.2) scaleX(0.9) translateY(-1px); opacity: 1; }
  }

  /* Dust particles */
  .dust {
    position: absolute;
    width: 3px; height: 3px;
    background: rgba(180,140,60,0.4);
    border-radius: 50%;
    animation: dustFloat var(--d) ease-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes dustFloat {
    0%   { transform: translate(0,0); opacity: 0.5; }
    100% { transform: translate(var(--dx), -30px); opacity: 0; }
  }

  /* ===== PRISM RAINBOW SPECTRUM ===== */
  #prism-spectrum {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 1px;
    pointer-events: none;
    animation: spectrumAppear 3s 4s forwards;
    opacity: 0;
  }
  @keyframes spectrumAppear {
    to { opacity: 1; }
  }
  .spectrum-ray {
    position: absolute;
    top: 0; left: 0;
    width: 200px;
    height: 2px;
    transform-origin: left center;
    border-radius: 0 2px 2px 0;
    opacity: 0.3;
    animation: rayPulse 3s ease-in-out infinite alternate;
    filter: blur(1px);
  }
  @keyframes rayPulse {
    from { opacity: 0.2; width: 180px; }
    to   { opacity: 0.45; width: 220px; }
  }

  /* ===== NAVBAR ===== */
  nav {
    position: relative;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 58px;
    background: rgba(10,8,5,0.7);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .nav-logo {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--sand));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo .logo-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    gap: 6px;
    list-style: none;
  }
  .nav-links a {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8b890;
    text-decoration: none;
    border-radius: 4px;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .nav-links a:hover {
    color: var(--gold-light);
    border-color: rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.06);
  }
  .nav-links a svg { opacity: 0.7; }

  /* ===== HERO ===== */
  #hero {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 100px;
    text-align: center;
    pointer-events: none;
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 12px;
    animation: fadeUp 0.8s 0.2s both;
  }

  .hero-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 900;
    letter-spacing: 12px;
    line-height: 1;
    background: linear-gradient(135deg, #fffbe0 0%, var(--gold-light) 30%, var(--gold) 60%, #a07830 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    animation: fadeUp 0.8s 0.4s both;
    text-shadow: none;
    position: relative;
  }

  .hero-sub {
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(232,220,200,0.5);
    margin-bottom: 48px;
    animation: fadeUp 0.8s 0.6s both;
  }
  .hero-sub a { color: var(--gold); opacity: 0.7; text-decoration: none; transition: opacity 0.2s; }
  .hero-sub a:hover { opacity: 1; }

  /* Search */
  #search-wrap {
    position: relative;
    z-index: 100;
    width: min(640px, 90vw);
    animation: fadeUp 0.8s 0.8s both;
    pointer-events: all;
  }

  #search-bar {
    width: 100%;
    padding: 18px 60px 18px 24px;
    background: rgba(30,22,10,0.75);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 6px;
    color: #e8dcc8;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    outline: none;
    backdrop-filter: blur(20px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #search-bar::placeholder { color: rgba(200,180,140,0.4); }
  #search-bar:focus {
    border-color: rgba(201,168,76,0.7);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1), 0 4px 30px rgba(0,0,0,0.5);
  }

  #search-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gold);
    opacity: 0.7;
    transition: opacity 0.2s;
    padding: 6px;
  }
  #search-btn:hover { opacity: 1; }

  /* ===== QUICK LINKS ===== */
  .quick-links {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    pointer-events: all;
    animation: fadeUp 0.8s 1s both;
  }
  .quick-link {
    padding: 6px 16px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.6);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 30px;
    text-decoration: none;
    transition: all 0.2s;
    background: rgba(201,168,76,0.04);
    cursor: pointer;
  }
  .quick-link:hover {
    color: var(--gold-light);
    border-color: rgba(201,168,76,0.5);
    background: rgba(201,168,76,0.1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== DECORATIVE HIEROGLYPHS ===== */
  .hieroglyph {
    position: absolute;
    font-size: 18px;
    color: rgba(201,168,76,0.08);
    animation: hieroglyphFade 6s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes hieroglyphFade {
    from { opacity: 0.04; }
    to   { opacity: 0.13; }
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Grain */
  #grain {
    position: fixed;
    inset: 0;
    z-index: 998;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  /* ===== PROXY OVERLAY ===== */
  #proxy-overlay {
    position: fixed;
    inset: 0;
    z-index: 500;
    display: flex;
    flex-direction: column;
    background: #0a0805;
    /* hidden by default */
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #proxy-overlay.open {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  #overlay-bar {
    flex-shrink: 0;
    height: 44px;
    background: #1e1e1e;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    z-index: 10;
  }

  #overlay-logo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #fffbe0, #c9a84c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #overlay-logo:hover { opacity: 0.75; }
  #overlay-logo::after {
    content: '← HOME';
    font-size: 8px;
    letter-spacing: 1.5px;
    opacity: 0;
    margin-left: -4px;
    transition: opacity 0.15s, margin 0.15s;
    -webkit-text-fill-color: rgba(201,168,76,0.6);
    color: rgba(201,168,76,0.6);
  }
  #overlay-logo:hover::after { opacity: 1; margin-left: 4px; }

  .ov-sep { width: 1px; height: 20px; background: #444; flex-shrink: 0; }

  #overlay-bar button {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  #overlay-bar button:hover { background: #333; color: #fff; }
  #ov-close:hover { color: #ff4455 !important; }

  #overlay-url {
    flex: 1;
    height: 27px;
    background: #111;
    border: 1px solid #3a3a3a;
    border-radius: 13px;
    color: #ddd;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    padding: 0 13px;
    outline: none;
    min-width: 0;
    transition: border-color 0.2s;
  }
  #overlay-url:focus { border-color: #c9a84c; }

  #proxy-iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

</style>
</head>
<body>

<!-- UV Proxy — must be first scripts in body, exactly like Utopia -->
<script src="uv/uv.bundle.js"></script>
<script src="uv/uv.config.js"></script>

<div id="grain"></div>

<!-- BACKGROUND SCENE -->
<div id="scene">
  <div id="sky"></div>
  <div id="stars"></div>
  <div id="moon"></div>

  <!-- Desert floor -->
  <div id="desert"></div>

  <!-- Sand dunes -->
  <div class="dune" style="width:340px;height:70px;left:-40px;bottom:17%;"></div>
  <div class="dune" style="width:260px;height:55px;right:-20px;bottom:17%;"></div>
  <div class="dune" style="width:180px;height:40px;left:30%;bottom:18.5%;"></div>

  <!-- Nile -->
  <div id="nile"></div>

  <!-- Hieroglyphs decorative -->
  <div class="hieroglyph" style="top:10%;left:5%;animation-delay:0s;">𓂀 𓆣 𓅃 𓋹</div>
  <div class="hieroglyph" style="top:20%;right:6%;animation-delay:2s;">𓁿 𓀭 𓏏 𓈖</div>
  <div class="hieroglyph" style="top:35%;left:3%;animation-delay:1s;">𓆄 𓇋 𓊪 𓃀</div>
  <div class="hieroglyph" style="top:35%;right:4%;animation-delay:3s;">𓂋 𓄿 𓅱 𓇼</div>

  <!-- Prism spectrum rays from top-centre -->
  <div id="prism-spectrum">
    <div class="spectrum-ray" style="background:linear-gradient(90deg,transparent,#ff0000);transform:rotate(-35deg);animation-delay:0s;"></div>
    <div class="spectrum-ray" style="background:linear-gradient(90deg,transparent,#ff7700);transform:rotate(-25deg);animation-delay:0.2s;"></div>
    <div class="spectrum-ray" style="background:linear-gradient(90deg,transparent,#ffff00);transform:rotate(-15deg);animation-delay:0.4s;"></div>
    <div class="spectrum-ray" style="background:linear-gradient(90deg,transparent,#00ff00);transform:rotate(-5deg);animation-delay:0.6s;"></div>
    <div class="spectrum-ray" style="background:linear-gradient(90deg,transparent,#00ccff);transform:rotate(5deg);animation-delay:0.8s;"></div>
    <div class="spectrum-ray" style="background:linear-gradient(90deg,transparent,#4400ff);transform:rotate(15deg);animation-delay:1s;"></div>
    <div class="spectrum-ray" style="background:linear-gradient(90deg,transparent,#cc00ff);transform:rotate(25deg);animation-delay:1.2s;"></div>
  </div>

  <!-- PYRAMID SCENE -->
  <div id="pyramid-scene">
    <div id="pyramid-wrapper">
      <svg id="pyramid-svg" viewBox="0 0 440 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="blockFaceLight" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#c8a840" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#e8c870" stop-opacity="0.95"/>
          </linearGradient>
          <linearGradient id="blockFaceDark" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#7a6020" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#a08030" stop-opacity="0.95"/>
          </linearGradient>
          <linearGradient id="shadowGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#000" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#000" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="tipGlow" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="#fffbe0" stop-opacity="1"/>
            <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Row 9 (base) — widest -->
        <g class="block-row" style="animation-delay: 0.2s;">
          <rect x="44" y="256" width="39" height="22" fill="url(#blockFaceLight)" stroke="#9a7820" stroke-width="0.5"/>
          <rect x="83" y="256" width="39" height="22" fill="url(#blockFaceLight)" stroke="#9a7820" stroke-width="0.5"/>

// ===== DUST =====

for (let i = 0; i < 25; i++) {

// ===== UV PROXY — inline overlay =====
function isUrl(val) {
  return /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(val) || /^https?:\/\//i.test(val);
}
function toAbsolute(val) {
  val = val.trim();
  if (!val) return null;
  if (isUrl(val)) return /^https?:\/\//i.test(val) ? val : 'https://' + val;
  return 'https://duckduckgo.com/?q=' + encodeURIComponent(val);
}
function toProxyUrl(url) {
  if (typeof __uv$config !== 'undefined' && __uv$config.prefix)
    return __uv$config.prefix + __uv$config.encodeUrl(url);
  return url;
}

function openOverlay(raw) {
  const abs = toAbsolute(raw);
  if (!abs) return;
  document.getElementById('overlay-url').value = abs;
  // Store destination so go.html can redirect after SW registers
  sessionStorage.setItem('prism_dest', abs);
  document.getElementById('proxy-iframe').src = 'go.html';
  document.getElementById('proxy-overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('proxy-overlay').classList.remove('open');
  document.getElementById('proxy-iframe').src = 'about:blank';
  document.getElementById('overlay-url').value = '';
}

function doSearch() {
  const val = document.getElementById('search-bar').value.trim();
  if (val) openOverlay(val);
}

document.getElementById('search-bar').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('search-btn').addEventListener('click', doSearch);

// Overlay address bar
document.getElementById('overlay-url').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const abs = toAbsolute(document.getElementById('overlay-url').value);
  if (abs) {
    sessionStorage.setItem('prism_dest', abs);
    document.getElementById('proxy-iframe').src = 'go.html';
    document.getElementById('overlay-url').value = abs;
  }
});

// Overlay nav buttons
document.getElementById('ov-back').addEventListener('click',   () => { try { document.getElementById('proxy-iframe').contentWindow.history.back(); }    catch(e){} });
document.getElementById('ov-fwd').addEventListener('click',    () => { try { document.getElementById('proxy-iframe').contentWindow.history.forward(); } catch(e){} });
document.getElementById('ov-reload').addEventListener('click', () => { try { document.getElementById('proxy-iframe').contentWindow.location.reload(); } catch(e) { const f = document.getElementById('proxy-iframe'); f.src = f.src; } });

// Quick links
const quickMap = { YouTube:'https://youtube.com', Reddit:'https://reddit.com', GitHub:'https://github.com', Twitch:'https://twitch.tv', Wikipedia:'https://wikipedia.org' };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });
document.querySelectorAll('.quick-link').forEach(el => {
  el.addEventListener('click', () => openOverlay(quickMap[el.textContent.trim()]));
});
</script>
